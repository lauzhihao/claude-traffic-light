# Claude 红绿灯推送中继 —— apn.vooice.tech 反代到本机 Docker 容器(127.0.0.1:8088)。
# 放到 /etc/nginx/conf.d/ 或 sites-available/ 后 `nginx -t && systemctl reload nginx`。
# 证书先用 certbot 签:见 relay/README.md「部署」。其它站点(cheapertokens 等)一概不动。

server {
    listen 80;
    listen [::]:80;
    server_name apn.vooice.tech;

    # Let's Encrypt HTTP-01 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apn.vooice.tech;

    ssl_certificate     /etc/letsencrypt/live/apn.vooice.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apn.vooice.tech/privkey.pem;

    client_max_body_size 8k;          # 接口只收小 JSON

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }
}
