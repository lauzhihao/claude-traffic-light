name = "claude-traffic-light-relay"
main = "src/index.js"
compatibility_date = "2025-01-01"

# 部署前先创建 KV：
#   npx wrangler kv:namespace create STORE
# 把命令输出的 id 填到下面
[[kv_namespaces]]
binding = "STORE"
id = "44a90a155e64433489d856a87985f9bb"

[vars]
APNS_ENV = "development"        # development | production
APNS_BUNDLE_ID = "com.liuzhihao.claudetrafficlight"

# 通过 secret 注入（不要写进文件）：
#   wrangler secret put APNS_KEY_P8        # .p8 文件全文（含 BEGIN/END 行）
#   wrangler secret put APNS_KEY_ID        # Apple 给的 10 位 Key ID
#   wrangler secret put APNS_TEAM_ID       # Apple 给的 10 位 Team ID
#   wrangler secret put REGISTER_SECRET    # iOS App 用它注册 push token
#   wrangler secret put UPDATE_SECRET      # Mac agent 用它推送状态
#   wrangler secret put COMMAND_SECRET     # iOS App 发命令 + Mac agent 拉命令都用它
