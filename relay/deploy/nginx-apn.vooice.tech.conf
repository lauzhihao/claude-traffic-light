# Claude 红绿灯推送中继 —— apn.vooice.tech 反代到本机 Docker 容器(127.0.0.1:8088)。
# 放到 /etc/nginx/conf.d/ 或 sites-available/ 后 `nginx -t && systemctl reload nginx`。
# 证书先用 certbot 签:见 relay/README.md「部署」。其它站点(cheapertokens 等)一概不动。

# 按源 IP 限频(nginx 层兜底,补应用层每用户限频):一般接口 10r/s、admin 更严 1r/s。
# zone 名带 apn_ 前缀避免和别的站点撞;放 http{} 作用域——若你的 conf.d 被 include 进
# http{},这两行就放这里;若不是,挪到主 nginx.conf 的 http{} 内。
limit_req_zone $binary_remote_addr zone=apn_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=apn_admin:10m   rate=1r/s;

server {
    listen 80;
    listen [::]:80;
    server_name apn.vooice.tech;

    # Let's Encrypt HTTP-01 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apn.vooice.tech;

    ssl_certificate     /etc/letsencrypt/live/apn.vooice.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apn.vooice.tech/privkey.pem;

    client_max_body_size 8k;          # 接口只收小 JSON

    # admin 接口更严限频 + 可选 IP allowlist(取消注释只放运维出口,纵深防御)
    location /v1/admin/ {
        limit_req zone=apn_admin burst=5 nodelay;
        # allow 1.2.3.4;  deny all;
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location / {
        limit_req zone=apn_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }
}
